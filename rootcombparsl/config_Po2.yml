# Configuration for Po2 SO-CASSI via MS-CASPT2 EFFE parallelization
# Reproducing Mertens et al. (JPCL 2019): D_e = 1.84 eV, R_e = 2.797 A
#
# 3 spin blocks: NoSym (Group=NoSym), CAS(12,8): Inactive=78, Ras2=8
#
# Execution order (RASSCF handoff): singlet → triplet → quintet
# JOB file order for SO-RASSI:      quintet=JOB001, triplet=JOB002, singlet=JOB003

cluster:
  account: "2025_046"                  # billing account (using up 2025_046 before it ends)
  partition: "cpu_milan_rhel9"
  caspt2_walltime: "00:30:00"          # CASPT2 roots — max observed ~18 min (triplet)
  rasscf_walltime: "00:45:00"          # RASSCF orbital optimisation (max observed ~8 min)
  long_walltime:   "02:00:00"          # EFFE combine + SO-RASSI (SO-RASSI observed ~34 min)
  rasscf_nprocs: 1                     # serial for now; set to 4 + switch module for MPI benchmark
  rasscf_max_blocks: 3                 # at most 3 RASSCF jobs ever (one per spin block)
  max_blocks: 30                       # 30 parallel CASPT2 workers (188 roots in ~7 passes)
  init_blocks: 0
  module: "autoCAS/3.0.0-iomkl-2023a"
  molcas_print: "verbose"
  molcas_mem: 6000                     # observed peak ~6 GB (sacct MaxRSS), set 6 GB as OpenMolcas limit
  # mem_per_node not set — cluster assigns default memory; explicit value caused sbatch to reject jobs
  molcas_nprocs: 1
  omp_threads: 1
  workdir_base: "/dodrio/scratch/projects/starting_2025_097/molcas_workdirs"
  scheduler_options: "#SBATCH --clusters=dodrio\n"

molecule:
  name: "Po2"
  xyz_file: "/dodrio/scratch/projects/starting_2025_097/autoCAS4HE_built/autoCAS4HE/tests/autocas/external_scf/Po2_scaling_test_final_casscf/VQZP/po2_016.xyz"
  # Starting orbital from autoCAS (system_16 = R≈2.9 Å ≈ equilibrium).
  # Default mode: used as starting guess for singlet RASSCF only; triplet/quintet
  #               orbitals come from the RASSCF handoff in the workflow.
  # CIONLY mode (--no-rasscf): used directly for all spin blocks.
  rasorb_path: "/dodrio/scratch/projects/starting_2025_097/autoCAS4HE_built/autoCAS4HE/tests/autocas/external_scf/Po2_scaling_test_final_casscf/VQZP/results_N25_rev/system_16.RasOrb"

# Blocks listed in RASSCF execution order (singlet→triplet→quintet).
# job_number determines the JOB file index in the final SO-RASSI.
calculations:

  - name: "singlet"
    spin: 1
    symmetry: 1
    n_roots: 28
    job_number: 3          # → JOB003 in SO-RASSI
    inactive: 78
    ras2: 8
    nactel: 12
    basis: "ANO-RCC-VQZP"
    imaginary: 0.25
    output_dir: "./singlet"

  - name: "triplet"
    spin: 3
    symmetry: 1
    n_roots: 90
    job_number: 2          # → JOB002 in SO-RASSI
    inactive: 78
    ras2: 8
    nactel: 12
    basis: "ANO-RCC-VQZP"
    imaginary: 0.25
    output_dir: "./triplet"

  - name: "quintet"
    spin: 5
    symmetry: 1
    n_roots: 70
    job_number: 1          # → JOB001 in SO-RASSI
    inactive: 78
    ras2: 8
    nactel: 12
    basis: "ANO-RCC-VQZP"
    imaginary: 0.25
    output_dir: "./quintet"
